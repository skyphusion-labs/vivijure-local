# vivijure-local app tunnel (studio + MinIO). Locally-managed; credentials.json is gitignored.
# Deploy with compose profile `tunnel` on flatliners (see cloudflared/README.md).
# SSH is NOT here -- flatliners runs a separate systemd cloudflared-ssh (fleet-chezmoi).
tunnel: e70e4085-fc71-4287-ae48-6a1673f57b3b
credentials-file: /etc/cloudflared/credentials.json

ingress:
  - hostname: vivijure-local.skyphusion.org
    service: http://127.0.0.1:8790
  - hostname: minio-flatliners.skyphusion.org
    service: http://127.0.0.1:9000
  - service: http_status:404

warp-routing:
  enabled: false
