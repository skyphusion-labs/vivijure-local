# vivijure-local compose (MinIO + CPU media)
#
# Start: docker compose up -d
# MinIO console: http://127.0.0.1:9001 (minioadmin / minioadmin)
# Studio: npm run dev (host process, :8790)

include:
  - path: ./containers/compose.yaml

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin 2>/dev/null; do sleep 1; done;
      mc mb --ignore-existing local/vivijure;
      exit 0;
      "
    restart: "no"

volumes:
  minio-data:
