# vivijure-local -- one-command homelab stack
#
#   npm run install:studio   # mint token + seed platform_secrets
#   docker compose up -d --build
#
# Studio UI:     http://127.0.0.1:8790
# MinIO console: http://127.0.0.1:9001  (minioadmin / minioadmin)
#
# GPU motion (local-gpu) and keyframe mocks run in compose by default (scripts/gpu-mock-module-server.ts).
# Point MODULE_LOCAL_GPU_URL at a real host backend when you have one.

name: vivijure-local

networks:
  studio:
    driver: bridge

volumes:
  minio-data:
  studio-data:

x-cpu-health: &cpu-health
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 30s

x-cpu-service: &cpu-service
  restart: unless-stopped
  networks: [studio]
  environment:
    PORT: "8000"
    ALLOW_HTTP_FETCH: "true"
    ALLOWED_FETCH_HOSTS: minio

x-module-sidecar: &module-sidecar
  build:
    context: ..
    dockerfile: vivijure-local/Dockerfile
  image: vivijure-local-studio:local
  restart: unless-stopped
  networks: [studio]

x-module-health: &module-health
  interval: 5s
  timeout: 3s
  retries: 6
  start_period: 20s

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    networks: [studio]
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    networks: [studio]
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin 2>/dev/null; do sleep 1; done;
      mc mb --ignore-existing local/vivijure;
      exit 0;
      "
    restart: "no"

  video-finish:
    <<: *cpu-service
    build: ./containers/video-finish
    image: vj-video-finish:local
    ports:
      - "127.0.0.1:8780:8000"
    healthcheck:
      <<: *cpu-health
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]

  image-prep:
    <<: *cpu-service
    build: ./containers/image-prep
    image: vj-image-prep:local
    ports:
      - "127.0.0.1:8781:8000"
    healthcheck:
      <<: *cpu-health
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]

  audio-beat-sync:
    <<: *cpu-service
    build: ./containers/audio-beat-sync
    image: vj-audio-beat-sync:local
    ports:
      - "127.0.0.1:8782:8000"
    healthcheck:
      <<: *cpu-health
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]

  audio-mix:
    <<: *cpu-service
    build: ./containers/audio-mix
    image: vj-audio-mix:local
    ports:
      - "127.0.0.1:8783:8000"
    healthcheck:
      <<: *cpu-health
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]

  audio-master:
    <<: *cpu-service
    build: ./containers/audio-master
    image: vj-audio-master:local
    ports:
      - "127.0.0.1:8784:8000"
    healthcheck:
      <<: *cpu-health
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]

  module-keyframe:
    <<: *module-sidecar
    command: ["npx", "tsx", "scripts/gpu-mock-module-server.ts", "9101", "keyframe"]
    healthcheck:
      <<: *module-health
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9101/module.json"]
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: vivijure
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: "true"

  module-local-gpu:
    <<: *module-sidecar
    command: ["npx", "tsx", "scripts/gpu-mock-module-server.ts", "9102", "local-gpu"]
    healthcheck:
      <<: *module-health
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9102/module.json"]
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: vivijure
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: "true"

  module-finish-rife:
    <<: *module-sidecar
    profiles: [satellites]
    command: ["npx", "tsx", "scripts/module-sidecar.ts", "9110", "dev/manifests/finish-rife.json"]

  module-finish-lipsync:
    <<: *module-sidecar
    profiles: [satellites]
    command: ["npx", "tsx", "scripts/module-sidecar.ts", "9111", "dev/manifests/finish-lipsync.json"]

  module-beat-sync:
    <<: *module-sidecar
    command: ["npx", "tsx", "scripts/cpu-module-server.ts", "9120", "beat-sync"]
    environment:
      AUDIO_BEAT_SYNC_URL: http://audio-beat-sync:8000

  module-audio-master:
    <<: *module-sidecar
    command: ["npx", "tsx", "scripts/cpu-module-server.ts", "9121", "audio-master"]
    environment:
      AUDIO_MASTER_URL: http://audio-master:8000

  module-film-titles:
    <<: *module-sidecar
    command: ["npx", "tsx", "scripts/cpu-module-server.ts", "9130", "film-titles"]
    environment:
      VIDEO_FINISH_URL: http://video-finish:8000

  module-subtitle:
    <<: *module-sidecar
    command: ["npx", "tsx", "scripts/cpu-module-server.ts", "9131", "subtitle"]
    environment:
      VIDEO_FINISH_URL: http://video-finish:8000

  studio:
    build:
      context: ..
      dockerfile: vivijure-local/Dockerfile
    image: vivijure-local-studio:local
    ports:
      - "127.0.0.1:8790:8790"
    env_file:
      - path: .env
        required: false
    environment:
      PORT: "8790"
      PUBLIC_BASE_URL: http://127.0.0.1:8790
      DATABASE_PATH: /app/vivijure-local/data/studio.db
      AUTH_MODE: ${AUTH_MODE:-token}
      STUDIO_API_TOKEN: ${STUDIO_API_TOKEN:-change-me-local-dev-only}
      PLANNER_AI_MOCK: ${PLANNER_AI_MOCK:-true}
      S3_ENDPOINT: http://minio:9000
      S3_PRESIGN_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: vivijure
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: "true"
      VIDEO_FINISH_URL: http://video-finish:8000
      IMAGE_PREP_URL: http://image-prep:8000
      AUDIO_BEAT_SYNC_URL: http://audio-beat-sync:8000
      AUDIO_MIX_URL: http://audio-mix:8000
      AUDIO_MASTER_URL: http://audio-master:8000
      MODULE_KEYFRAME_URL: http://module-keyframe:9101
      MODULE_LOCAL_GPU_URL: http://module-local-gpu:9102
      # Optional finish GPU satellites (compose profile `satellites`; see docs/install-profiles.md)
      MODULE_FINISH_RIFE_URL: ${MODULE_FINISH_RIFE_URL:-}
      MODULE_FINISH_LIPSYNC_URL: ${MODULE_FINISH_LIPSYNC_URL:-}
      MODULE_BEAT_SYNC_URL: http://module-beat-sync:9120
      MODULE_AUDIO_MASTER_URL: http://module-audio-master:9121
      MODULE_FILM_TITLES_URL: http://module-film-titles:9130
      MODULE_SUBTITLE_URL: http://module-subtitle:9131
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - studio-data:/app/vivijure-local/data
    networks: [studio]
    restart: unless-stopped
    depends_on:
      minio-init:
        condition: service_completed_successfully
      video-finish:
        condition: service_healthy
      image-prep:
        condition: service_healthy
      audio-beat-sync:
        condition: service_healthy
      audio-mix:
        condition: service_healthy
      audio-master:
        condition: service_healthy
      module-keyframe:
        condition: service_healthy
      module-local-gpu:
        condition: service_healthy
      module-beat-sync:
        condition: service_started
      module-audio-master:
        condition: service_started
      module-film-titles:
        condition: service_started
      module-subtitle:
        condition: service_started
