# vivijure-local -- one-command homelab stack
#
#   npm run install:studio   # mint token + seed platform_secrets
#   docker compose up -d --build
#   COMPOSE_PROFILES=tunnel docker compose up -d --build   # + cloudflared (flatliners)
#
# Studio UI:     http://127.0.0.1:8790  (or PUBLIC_BASE_URL via cloudflared)
# MinIO console: http://127.0.0.1:9001  (minioadmin / minioadmin)
# MinIO S3 API:  http://127.0.0.1:9000  (in-network); expose via cloudflared for remote GPUs
#   see docs/MINIO-TUNNEL.md and S3_PRESIGN_ENDPOINT in .env
#
# GPU motion modules proxy to RunPod or LOCAL_BACKEND_URL; control plane never runs GPU work.
# Keyframe falls back to mock PNGs when RUNPOD_* is unset; local-gpu falls back to mock when
# LOCAL_BACKEND_URL is unset (offline homelab default).

name: vivijure-local

networks:
  studio:
    driver: bridge

volumes:
  minio-data:
  studio-data:

x-cpu-health: &cpu-health
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 30s

x-cpu-service: &cpu-service
  restart: unless-stopped
  networks: [studio]
  environment:
    PORT: "8000"
    ALLOW_HTTP_FETCH: ${S3_ALLOW_HTTP_FETCH:-true}
    ALLOWED_FETCH_HOSTS: ${S3_FETCH_ALLOW_HOSTS:-minio}

x-module-sidecar: &module-sidecar
  build:
    context: ..
    dockerfile: vivijure-local/Dockerfile
  image: vivijure-local-studio:local
  restart: unless-stopped
  networks: [studio]

x-module-health: &module-health
  interval: 5s
  timeout: 3s
  retries: 6
  start_period: 20s

x-runpod-module: &runpod-module
  <<: *module-sidecar
  environment:
    RUNPOD_API_KEY: ${RUNPOD_API_KEY:-}
    RUNPOD_ENDPOINT_ID: ${RUNPOD_ENDPOINT_ID:-}
    S3_ENDPOINT: http://minio:9000
    S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
    S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    S3_BUCKET: vivijure
    S3_REGION: us-east-1
    S3_FORCE_PATH_STYLE: "true"

x-module-health-url: &module-health-url
  interval: 5s
  timeout: 3s
  retries: 6
  start_period: 20s

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    networks: [studio]
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    networks: [studio]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD 2>/dev/null; do sleep 1; done;
      mc mb --ignore-existing local/vivijure;
      exit 0;
      "
    restart: "no"

  video-finish:
    <<: *cpu-service
    build: ./containers/video-finish
    image: vj-video-finish:local
    ports:
      - "127.0.0.1:8780:8000"
    healthcheck:
      <<: *cpu-health
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]

  image-prep:
    <<: *cpu-service
    build: ./containers/image-prep
    image: vj-image-prep:local
    ports:
      - "127.0.0.1:8781:8000"
    healthcheck:
      <<: *cpu-health
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]

  audio-beat-sync:
    <<: *cpu-service
    build: ./containers/audio-beat-sync
    image: vj-audio-beat-sync:local
    ports:
      - "127.0.0.1:8782:8000"
    healthcheck:
      <<: *cpu-health
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]

  audio-mix:
    <<: *cpu-service
    build: ./containers/audio-mix
    image: vj-audio-mix:local
    ports:
      - "127.0.0.1:8783:8000"
    healthcheck:
      <<: *cpu-health
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]

  audio-master:
    <<: *cpu-service
    build: ./containers/audio-master
    image: vj-audio-master:local
    ports:
      - "127.0.0.1:8784:8000"
    healthcheck:
      <<: *cpu-health
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]

  module-keyframe:
    <<: *runpod-module
    command: ["npx", "tsx", "scripts/runpod-module-server.ts", "9101", "keyframe"]
    healthcheck:
      <<: *module-health-url
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9101/module.json"]

  module-local-gpu:
    <<: *module-sidecar
    command: ["npx", "tsx", "scripts/local-gpu-module-server.ts", "9102"]
    healthcheck:
      <<: *module-health-url
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9102/module.json"]
    environment:
      LOCAL_BACKEND_URL: ${LOCAL_BACKEND_URL:-}
      LOCAL_BACKEND_TOKEN: ${LOCAL_BACKEND_TOKEN:-}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET: vivijure
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: "true"

  module-own-gpu:
    <<: *runpod-module
    command: ["npx", "tsx", "scripts/runpod-module-server.ts", "9103", "own-gpu"]
    healthcheck:
      <<: *module-health-url
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9103/module.json"]

  module-finish-rife:
