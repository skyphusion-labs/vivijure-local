# vivijure-local -- one-command homelab stack
#
#   npm run install:studio   # mint token + seed platform_secrets
#   npm run compose:up       # pull GHCR :latest + docker compose up -d
#   npm run install:edge     # DNS checklist + Caddy site config for public HTTPS
#   COMPOSE_PROFILES=edge npm run compose:up   # + Caddy (studio + MinIO TLS)
#   COMPOSE_PROFILES=wan-lora npm run compose:up # + alibaba-wan-lora (opt-in; delisted #772)
#
# Images are built on push to main and published to GHCR (see docker-build workflow).
# Override VJ_IMAGE_REGISTRY / VJ_IMAGE_TAG in .env to pin a different registry or tag.
# Private GHCR: docker login ghcr.io (read:packages) before compose:up.
#
# Studio UI:     http://127.0.0.1:8790  (or https via COMPOSE_PROFILES=edge; see docs/EDGE.md)
# MinIO console: http://127.0.0.1:9001  (rotate off minioadmin before public expose)
# MinIO S3 API:  http://127.0.0.1:9000  (in-network); public HTTPS via Caddy + S3_PRESIGN_ENDPOINT
#
# GPU motion modules proxy to RunPod or LOCAL_BACKEND_URL; control plane never runs GPU work.
# Keyframe falls back to mock PNGs when RUNPOD_* is unset; local-gpu falls back to mock when
# LOCAL_BACKEND_URL is unset (offline homelab default).

name: vivijure-local

networks:
  studio:
    driver: bridge

volumes:
  minio-data:
  studio-data:
  caddy-data:
  caddy-config:

x-cpu-health: &cpu-health
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 30s

x-cpu-service: &cpu-service
  restart: unless-stopped
  networks: [studio]
  pull_policy: always
  environment:
    PORT: "8000"
    ALLOW_HTTP_FETCH: ${S3_ALLOW_HTTP_FETCH:-true}
    ALLOWED_FETCH_HOSTS: ${S3_FETCH_ALLOW_HOSTS:-minio}

x-module-sidecar: &module-sidecar
  image: ${VJ_IMAGE_REGISTRY:-ghcr.io/skyphusion-labs}/vivijure-local-studio:${VJ_IMAGE_TAG:-latest}
  pull_policy: always
  restart: unless-stopped
  networks: [studio]

x-module-health: &module-health
  interval: 5s
  timeout: 3s
  retries: 6
  start_period: 20s

x-cpu-module-env: &cpu-module-env
  DATABASE_PATH: /app/vivijure-local/data/studio.db

x-cpu-module: &cpu-module
  <<: *module-sidecar
  volumes:
    - studio-data:/app/vivijure-local/data:ro
  environment:
    <<: *cpu-module-env

x-runpod-module: &runpod-module
  <<: *module-sidecar
  volumes:
    - studio-data:/app/vivijure-local/data:ro
  environment:
    DATABASE_PATH: /app/vivijure-local/data/studio.db
    RUNPOD_API_KEY: ${RUNPOD_API_KEY:-}
    RUNPOD_ENDPOINT_ID: ${RUNPOD_ENDPOINT_ID:-}
    VIDEO_UPSCALE_RUNPOD_ENDPOINT_ID: ${VIDEO_UPSCALE_RUNPOD_ENDPOINT_ID:-}
    MUSETALK_RUNPOD_ENDPOINT_ID: ${MUSETALK_RUNPOD_ENDPOINT_ID:-}
    AUDIO_UPSCALE_RUNPOD_ENDPOINT_ID: ${AUDIO_UPSCALE_RUNPOD_ENDPOINT_ID:-}
    # Wan cast LoRA train: LOCAL RunPod EP only (8kjcn5sz6k8p1n). Never prod zqb7tougbqfkqa (cf#29 / MinIO vs R2).
    RUNPOD_WAN_TRAIN_ENDPOINT_ID: ${RUNPOD_WAN_TRAIN_ENDPOINT_ID:-}
    S3_ENDPOINT: http://minio:9000
    S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
    S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    S3_BUCKET: vivijure
    S3_REGION: us-east-1
    S3_FORCE_PATH_STYLE: "true"

x-module-health-url: &module-health-url
  interval: 5s
  timeout: 3s
  retries: 6
  start_period: 20s

x-ai-gateway-env: &ai-gateway-env
  CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
  GATEWAY_ID: ${GATEWAY_ID:-skyphusion-llm}
  CF_AIG_TOKEN: ${CF_AIG_TOKEN:-}

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      # Virtual-host S3 (vivijure.<domain>) for RunPod boto3 default; path-style still works for studio.
      # Set MINIO_PUBLIC_DOMAIN to your public MinIO hostname when using COMPOSE_PROFILES=edge.
      MINIO_DOMAIN: ${MINIO_PUBLIC_DOMAIN:-}
    volumes:
      - minio-data:/data
    networks: [studio]
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    networks: [studio]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET: vivijure
    volumes:
      - ./scripts/seed-minio-layout.sh:/seed-minio-layout.sh:ro
    entrypoint: ["/bin/sh", "/seed-minio-layout.sh"]
    restart: "no"

  video-finish:
    <<: *cpu-service
    image: ${VJ_IMAGE_REGISTRY:-ghcr.io/skyphusion-labs}/vivijure-local-video-finish:${VJ_IMAGE_TAG:-latest}
    ports:
      - "127.0.0.1:8780:8000"
    healthcheck:
      <<: *cpu-health
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]

  image-prep:
    <<: *cpu-service
    image: ${VJ_IMAGE_REGISTRY:-ghcr.io/skyphusion-labs}/vivijure-local-image-prep:${VJ_IMAGE_TAG:-latest}
    ports:
      - "127.0.0.1:8781:8000"
    healthcheck:
      <<: *cpu-health
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]

  audio-beat-sync:
    <<: *cpu-service
    image: ${VJ_IMAGE_REGISTRY:-ghcr.io/skyphusion-labs}/vivijure-local-audio-beat-sync:${VJ_IMAGE_TAG:-latest}
    ports:
      - "127.0.0.1:8782:8000"
    healthcheck:
      <<: *cpu-health
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]

  audio-mix:
    <<: *cpu-service
    image: ${VJ_IMAGE_REGISTRY:-ghcr.io/skyphusion-labs}/vivijure-local-audio-mix:${VJ_IMAGE_TAG:-latest}
    ports:
      - "127.0.0.1:8783:8000"
    healthcheck:
      <<: *cpu-health
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]

  audio-master:
    <<: *cpu-service
    image: ${VJ_IMAGE_REGISTRY:-ghcr.io/skyphusion-labs}/vivijure-local-audio-master:${VJ_IMAGE_TAG:-latest}
    ports:
      - "127.0.0.1:8784:8000"
    healthcheck:
      <<: *cpu-health
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]

  module-keyframe:
    <<: *runpod-module
    command: ["npx", "tsx", "scripts/runpod-module-server.ts", "9101", "keyframe"]
    healthcheck:
      <<: *module-health-url
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9101/module.json"]

  module-local-gpu:
    <<: *cpu-module
    command: ["npx", "tsx", "scripts/local-gpu-module-server.ts", "9102"]
    healthcheck:
      <<: *module-health-url
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9102/module.json"]
    environment:
      LOCAL_BACKEND_URL: ${LOCAL_BACKEND_URL:-}
      LOCAL_BACKEND_TOKEN: ${LOCAL_BACKEND_TOKEN:-}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET: vivijure
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: "true"

  module-own-gpu:
    <<: *runpod-module
    command: ["npx", "tsx", "scripts/runpod-module-server.ts", "9103", "own-gpu"]
    healthcheck:
      <<: *module-health-url
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9103/module.json"]

  module-finish-rife:
    <<: *runpod-module
    command: ["npx", "tsx", "scripts/runpod-module-server.ts", "9110", "finish-rife"]
    healthcheck:
      <<: *module-health-url
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9110/module.json"]

  module-finish-lipsync:
    <<: *runpod-module
    command: ["npx", "tsx", "scripts/runpod-module-server.ts", "9111", "finish-lipsync"]
    healthcheck:
      <<: *module-health-url
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9111/module.json"]

  module-finish-upscale:
    <<: *runpod-module
    command: ["npx", "tsx", "scripts/runpod-module-server.ts", "9112", "finish-upscale"]
    healthcheck:
      <<: *module-health-url
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9112/module.json"]

  module-seedance:
    <<: *runpod-module
    command: ["npx", "tsx", "scripts/runpod-module-server.ts", "9150", "seedance"]
    healthcheck:
      <<: *module-health-url
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9150/module.json"]

  module-kling:
    <<: *runpod-module
    command: ["npx", "tsx", "scripts/runpod-module-server.ts", "9151", "kling"]
    healthcheck:
      <<: *module-health-url
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9151/module.json"]

  module-google-veo:
    <<: *runpod-module
    command: ["npx", "tsx", "scripts/runpod-module-server.ts", "9152", "google-veo"]
    healthcheck:
      <<: *module-health-url
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9152/module.json"]

  module-minimax-hailuo:
    <<: *runpod-module
    command: ["npx", "tsx", "scripts/runpod-module-server.ts", "9153", "minimax-hailuo"]
    healthcheck:
      <<: *module-health-url
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9153/module.json"]

  module-vidu-q3:
    <<: *runpod-module
    command: ["npx", "tsx", "scripts/runpod-module-server.ts", "9154", "vidu-q3"]
    healthcheck:
      <<: *module-health-url
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9154/module.json"]

  module-alibaba-wan:
    <<: *runpod-module
    command: ["npx", "tsx", "scripts/runpod-module-server.ts", "9155", "alibaba-wan"]
    healthcheck:
      <<: *module-health-url
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9155/module.json"]

  module-alibaba-wan-lora:
    <<: *runpod-module
    profiles: [wan-lora]
    command: ["npx", "tsx", "scripts/runpod-module-server.ts", "9156", "alibaba-wan-lora"]
    healthcheck:
      <<: *module-health-url
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9156/module.json"]

  module-cloud-keyframe:
    <<: *module-sidecar
    volumes:
      - studio-data:/app/vivijure-local/data:ro
    command: ["npx", "tsx", "scripts/cloud-keyframe-module-server.ts", "9157"]
    healthcheck:
      <<: *module-health-url
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9157/module.json"]
    environment:
      DATABASE_PATH: /app/vivijure-local/data/studio.db
      <<: *ai-gateway-env
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET: vivijure
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: "true"

  module-music-gen:
    <<: *module-sidecar
    volumes:
      - studio-data:/app/vivijure-local/data:ro
    command: ["npx", "tsx", "scripts/score-module-server.ts", "9158", "music-gen"]
    healthcheck:
      <<: *module-health-url
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9158/module.json"]
    environment:
      DATABASE_PATH: /app/vivijure-local/data/studio.db
      <<: *ai-gateway-env
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET: vivijure
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: "true"

  module-narration-gen:
    <<: *runpod-module
    command: ["npx", "tsx", "scripts/score-module-server.ts", "9159", "narration-gen"]
    healthcheck:
      <<: *module-health-url
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9159/module.json"]

  module-beat-sync:
    <<: *cpu-module
    command: ["npx", "tsx", "scripts/cpu-module-server.ts", "9120", "beat-sync"]
    healthcheck:
      <<: *module-health-url
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9120/module.json"]
    environment:
      <<: *cpu-module-env
      AUDIO_BEAT_SYNC_URL: http://audio-beat-sync:8000

  module-audio-master:
    <<: *cpu-module
    command: ["npx", "tsx", "scripts/cpu-module-server.ts", "9121", "audio-master"]
    healthcheck:
      <<: *module-health-url
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9121/module.json"]
    environment:
      <<: *cpu-module-env
      AUDIO_MASTER_URL: http://audio-master:8000

  module-film-titles:
    <<: *cpu-module
    command: ["npx", "tsx", "scripts/cpu-module-server.ts", "9130", "film-titles"]
    healthcheck:
      <<: *module-health-url
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9130/module.json"]
    environment:
      <<: *cpu-module-env
      VIDEO_FINISH_URL: http://video-finish:8000

  module-subtitle:
    <<: *cpu-module
    command: ["npx", "tsx", "scripts/cpu-module-server.ts", "9131", "subtitle"]
    healthcheck:
      <<: *module-health-url
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9131/module.json"]
    environment:
      <<: *cpu-module-env
      VIDEO_FINISH_URL: http://video-finish:8000

  module-plan-enhance:
    <<: *module-sidecar
    volumes:
      - studio-data:/app/vivijure-local/data:ro
    command: ["npx", "tsx", "scripts/chain-module-server.ts", "9140", "plan-enhance"]
    healthcheck:
      <<: *module-health
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9140/module.json"]
    environment:
      DATABASE_PATH: /app/vivijure-local/data/studio.db
      PLANNER_AI_MOCK: ${PLANNER_AI_MOCK:-true}
      <<: *ai-gateway-env
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET: vivijure
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: "true"

  module-cast-image:
    <<: *module-sidecar
    volumes:
      - studio-data:/app/vivijure-local/data:ro
    command: ["npx", "tsx", "scripts/chain-module-server.ts", "9141", "cast-image"]
    healthcheck:
      <<: *module-health
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9141/module.json"]
    environment:
      DATABASE_PATH: /app/vivijure-local/data/studio.db
      <<: *ai-gateway-env
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET: vivijure
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: "true"

  # image.generate (cf#129): local's own declaring module for the chat image path. LOAD-BEARING for
  # the image catalog, not an extra -- the studio hardcodes no image model names, so GET /api/models
  # projects its image rows from this module. Unbound, the image picker is honestly empty.
  # Port 9145: 9140-9144 are the other chain modules, 9150+ the video ones.
  # NO S3/bucket env, deliberately: this module returns image BYTES and never writes storage. That is
  # what makes the cf#140 write/serve split structurally unreachable (the core owns persistence).
  module-image-generate:
    <<: *module-sidecar
    command: ["npx", "tsx", "scripts/chain-module-server.ts", "9145", "image-generate"]
    healthcheck:
      <<: *module-health
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9145/module.json"]
    environment:
      <<: *ai-gateway-env

  module-dialogue-gen:
    <<: *module-sidecar
    volumes:
      - studio-data:/app/vivijure-local/data:ro
    command: ["npx", "tsx", "scripts/chain-module-server.ts", "9142", "dialogue-gen"]
    healthcheck:
      <<: *module-health
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9142/module.json"]
    environment:
      DATABASE_PATH: /app/vivijure-local/data/studio.db
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET: vivijure
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: "true"

  module-speech-upscale:
    <<: *module-sidecar
    volumes:
      - studio-data:/app/vivijure-local/data:ro
    command: ["npx", "tsx", "scripts/chain-module-server.ts", "9143", "speech-upscale"]
    healthcheck:
      <<: *module-health
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9143/module.json"]
    environment:
      DATABASE_PATH: /app/vivijure-local/data/studio.db
      RUNPOD_API_KEY: ${RUNPOD_API_KEY:-}
      RUNPOD_ENDPOINT_ID: ${RUNPOD_ENDPOINT_ID:-}
      AUDIO_UPSCALE_RUNPOD_ENDPOINT_ID: ${AUDIO_UPSCALE_RUNPOD_ENDPOINT_ID:-}
      # LOCAL Wan train EP only (8kjcn5sz6k8p1n); never prod zqb7tougbqfkqa
      RUNPOD_WAN_TRAIN_ENDPOINT_ID: ${RUNPOD_WAN_TRAIN_ENDPOINT_ID:-}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET: vivijure
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: "true"

  module-notify-email:
    <<: *module-sidecar
    command: ["npx", "tsx", "scripts/chain-module-server.ts", "9144", "notify-email"]
    healthcheck:
      <<: *module-health
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9144/module.json"]

  studio:
    image: ${VJ_IMAGE_REGISTRY:-ghcr.io/skyphusion-labs}/vivijure-local-studio:${VJ_IMAGE_TAG:-latest}
    pull_policy: always
    ports:
      - "127.0.0.1:8790:8790"
    env_file:
      - path: .env
        required: false
    environment:
      PORT: "8790"
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://127.0.0.1:8790}
      DATABASE_PATH: /app/vivijure-local/data/studio.db
      AUTH_MODE: ${AUTH_MODE:-token}
      STUDIO_API_TOKEN: ${STUDIO_API_TOKEN:-change-me-local-dev-only}
      PLANNER_AI_MOCK: ${PLANNER_AI_MOCK:-true}
      S3_ENDPOINT: http://minio:9000
      S3_PRESIGN_ENDPOINT: ${S3_PRESIGN_ENDPOINT:-http://minio:9000}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET: vivijure
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: "true"
      VIDEO_FINISH_URL: http://video-finish:8000
      IMAGE_PREP_URL: http://image-prep:8000
      AUDIO_BEAT_SYNC_URL: http://audio-beat-sync:8000
      AUDIO_MIX_URL: http://audio-mix:8000
      AUDIO_MASTER_URL: http://audio-master:8000
      RUNPOD_API_KEY: ${RUNPOD_API_KEY:-}
      RUNPOD_ENDPOINT_ID: ${RUNPOD_ENDPOINT_ID:-}
      VIDEO_UPSCALE_RUNPOD_ENDPOINT_ID: ${VIDEO_UPSCALE_RUNPOD_ENDPOINT_ID:-}
      MUSETALK_RUNPOD_ENDPOINT_ID: ${MUSETALK_RUNPOD_ENDPOINT_ID:-}
      AUDIO_UPSCALE_RUNPOD_ENDPOINT_ID: ${AUDIO_UPSCALE_RUNPOD_ENDPOINT_ID:-}
      # LOCAL Wan train EP only (8kjcn5sz6k8p1n); never prod zqb7tougbqfkqa
      RUNPOD_WAN_TRAIN_ENDPOINT_ID: ${RUNPOD_WAN_TRAIN_ENDPOINT_ID:-}
      LOCAL_BACKEND_URL: ${LOCAL_BACKEND_URL:-}
      LOCAL_BACKEND_TOKEN: ${LOCAL_BACKEND_TOKEN:-}
      MODULE_KEYFRAME_URL: http://module-keyframe:9101
      MODULE_LOCAL_GPU_URL: http://module-local-gpu:9102
      MODULE_OWN_GPU_URL: http://module-own-gpu:9103
      MODULE_FINISH_RIFE_URL: http://module-finish-rife:9110
      MODULE_LIPSYNC_URL: http://module-finish-lipsync:9111
      MODULE_UPSCALE_URL: http://module-finish-upscale:9112
      MODULE_SEEDANCE_URL: http://module-seedance:9150
      MODULE_KLING_URL: http://module-kling:9151
      MODULE_GOOGLE_VEO_URL: http://module-google-veo:9152
      MODULE_MINIMAX_HAILUO_URL: http://module-minimax-hailuo:9153
      MODULE_VIDU_Q3_URL: http://module-vidu-q3:9154
      MODULE_ALIBABA_WAN_URL: http://module-alibaba-wan:9155
      MODULE_CLOUD_KEYFRAME_URL: http://module-cloud-keyframe:9157
      MODULE_MUSIC_GEN_URL: http://module-music-gen:9158
      MODULE_NARRATION_GEN_URL: http://module-narration-gen:9159
      MODULE_BEAT_SYNC_URL: http://module-beat-sync:9120
