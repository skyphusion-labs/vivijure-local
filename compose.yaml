  caddy:
    # Public HTTPS edge (Let's Encrypt). Opt-in: COMPOSE_PROFILES=edge.
    # Terminates TLS for the studio host and MinIO (including *.minio-host wildcard for S3
    # virtual-hosted buckets). Image includes several caddy-dns modules; pick one with
    # CADDY_DNS_PROVIDER / npm run install:edge. Full guide: docs/EDGE.md.
    profiles: [edge]
    build: ./reverse-proxy
    image: ${VJ_IMAGE_REGISTRY:-ghcr.io/skyphusion-labs}/vivijure-local-caddy:${VJ_IMAGE_TAG:-latest}
    pull_policy: build
    restart: unless-stopped
    networks: [studio]
    # EDGE_BIND_IP: host address for :80/:443 (default all interfaces). Homelabbers usually leave
    # the default. Behind an L4 load balancer, set this to the private/VLAN IP only.
    ports:
      - "${EDGE_BIND_IP:-0.0.0.0}:443:443"
      - "${EDGE_BIND_IP:-0.0.0.0}:80:80"
    environment:
      CADDY_APP_HOST: ${CADDY_APP_HOST:-localhost}
      CADDY_MINIO_HOST: ${CADDY_MINIO_HOST:-}
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL:-}
      CADDY_DNS_PROVIDER: ${CADDY_DNS_PROVIDER:-cloudflare}
      # DNS-01 API tokens (set the ones for your provider; keep out of git)
      CF_DNS_TOKEN: ${CF_DNS_TOKEN:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_HOSTED_ZONE_ID: ${AWS_HOSTED_ZONE_ID:-}
      DO_AUTH_TOKEN: ${DO_AUTH_TOKEN:-}
      GCP_PROJECT: ${GCP_PROJECT:-}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      HETZNER_API_TOKEN: ${HETZNER_API_TOKEN:-}
      OVH_ENDPOINT: ${OVH_ENDPOINT:-}
      OVH_APPLICATION_KEY: ${OVH_APPLICATION_KEY:-}
      OVH_APPLICATION_SECRET: ${OVH_APPLICATION_SECRET:-}
      OVH_CONSUMER_KEY: ${OVH_CONSUMER_KEY:-}
      # Only if your L4 LB sends PROXY protocol: trusted source CIDR.
      CADDY_PROXY_ALLOW: ${CADDY_PROXY_ALLOW:-}
    volumes:
      - caddy-data:/data
      - caddy-config:/config
      - ./reverse-proxy/sites.runtime.caddyfile:/etc/caddy/sites.caddyfile:ro
      - ./reverse-proxy/certs:/certs:ro
    depends_on:
      studio:
        condition: service_started
      minio:
        condition: service_started
