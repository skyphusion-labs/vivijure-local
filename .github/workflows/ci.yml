name: ci

# Typecheck + test + module conformance on every push and PR. Required check name is
# `ci` (aviation-grade ruleset); typecheck is a step inside this job, not a separate check.
# vivijure-local is PUBLIC; runs on GitHub-hosted ubuntu-latest (fork-safe).
#
# Installs @skyphusion-labs/vivijure-core from npm (^0.9.0). Sibling vivijure-core
# checkout remains for conformance + core typecheck/test scripts; vivijure sparse
# checkout for quality-tier-drift in core's vitest.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          path: vivijure-local
      - name: Checkout vivijure-core
        uses: actions/checkout@v7
        with:
          repository: skyphusion-labs/vivijure-core
          path: vivijure-core
      - name: Checkout vivijure (core quality-tier-drift module manifests)
        uses: actions/checkout@v7
        with:
          repository: skyphusion-labs/vivijure
          path: vivijure
          sparse-checkout: |
            modules/keyframe
            modules/own-gpu
          sparse-checkout-cone-mode: false
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            vivijure-local/package-lock.json
            vivijure-core/package-lock.json
      - name: Install vivijure-core
        working-directory: vivijure-core
        run: npm ci && npm run build
      - name: Install vivijure-local
        working-directory: vivijure-local
        run: |
          npm pkg set dependencies.@skyphusion-labs/vivijure-core=file:../vivijure-core
          npm ci
      - name: Typecheck
        working-directory: vivijure-local
        run: npm run typecheck
      - name: Test
        working-directory: vivijure-local
        run: npm test
      - name: Module conformance
        working-directory: vivijure-local
        run: npm run conformance
