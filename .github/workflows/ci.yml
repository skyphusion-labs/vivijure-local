name: ci

# Typecheck + test + module conformance on every push and PR. Required check name is
# `ci` (aviation-grade ruleset); typecheck is a step inside this job, not a separate check.
# vivijure-local is PUBLIC; runs on GitHub-hosted ubuntu-latest (fork-safe).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Module conformance
        run: npm run conformance
