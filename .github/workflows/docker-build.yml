name: docker-build

# Build-only smoke for compose images on GitHub-hosted runners. Catches Dockerfile /
# dependency drift the vitest suite never exercises. No registry push in v1 (add GHCR
# publish on version tags when the repo is public).
#
# Studio image build context is the parent dir (sibling vivijure-core required).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - Dockerfile
      - compose.yaml
      - containers/**
      - package.json
      - package-lock.json
      - .github/workflows/docker-build.yml

permissions:
  contents: read

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  studio-image:
    name: studio
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          path: vivijure-local

      - uses: actions/checkout@v7
        with:
          repository: skyphusion-labs/vivijure-core
          path: vivijure-core
          ref: feat/vivijure-parity-p0 # drop after vivijure-core parity PR merges to main

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build studio image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.0.0
        with:
          context: .
          file: vivijure-local/Dockerfile
          push: false
          tags: ghcr.io/skyphusion-labs/vivijure-local-studio:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cpu-images:
    name: cpu-${{ matrix.image }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        image:
          - video-finish
          - image-prep
          - audio-beat-sync
          - audio-mix
          - audio-master
    steps:
      - uses: actions/checkout@v7
        with:
          path: vivijure-local

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build CPU container image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.0.0
        with:
          context: ./vivijure-local/containers/${{ matrix.image }}
          file: ./vivijure-local/containers/${{ matrix.image }}/Dockerfile
          push: false
          tags: ghcr.io/skyphusion-labs/vivijure-local-${{ matrix.image }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
