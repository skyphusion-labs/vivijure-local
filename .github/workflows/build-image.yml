name: build-image

# Build compose images on GitHub-hosted runners. PRs and merges to main =
# build-only smoke (:ci tag, no push). A pushed version tag (v*) publishes GHCR
# :latest + :X.Y.Z (v prefix stripped; matches RunPod sibling image tags) for
# homelab compose pull. A merge to main never publishes; release deliberately
# with git tag -a vX.Y.Z && git push origin vX.Y.Z. :latest is the compose
# default (VJ_IMAGE_TAG) and only moves when a release tag is cut.
#
# Studio image installs @skyphusion-labs/vivijure-core and vivijure-mcp from npm.
# Tag bakes sync the org GPU allowlist on ubuntu-latest before scheduling here.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    paths:
      - Dockerfile
      - compose.yaml
      - containers/**
      - reverse-proxy/**
      - package.json
      - package-lock.json
      - .github/workflows/build-image.yml
      - docs/FINISH_BACKEND.md

permissions:
  contents: read
  packages: write

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io/skyphusion-labs

jobs:
  # Inline sync (not workflow_call): public repos cannot call reusable workflows in
  # internal fleet-chezmoi (workflow validation fails with 0 jobs).
  sync-gpu-allowlist:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout fleet-chezmoi (sync script)
        uses: actions/checkout@v4
        with:
          repository: skyphusion-labs/fleet-chezmoi
          ref: main
          token: ${{ secrets.RUNNER_GROUP_ADMIN_TOKEN }}

      - name: Sync vivijure-gpu-builds allowlist
        env:
          GH_TOKEN: ${{ secrets.RUNNER_GROUP_ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          bash scripts/sync-vivijure-gpu-builds-allowlist.sh \
            --apply \
            --ensure-tag "vivijure-local" "${{ github.ref_name }}"

  # SECURITY GATE (fc#859): a v* tag can point at ANY commit, including one that never merged.
  # The org tag ruleset enforces deletion + non_fast_forward only, so `git tag v9.9.9 <unmerged>
  # && git push origin v9.9.9` would PUBLISH GHCR :latest + :X.Y.Z images from unreviewed code
  # (all three build jobs push on a tag), routing around branch protection. The three publish
  # jobs now `needs: assert-on-main`.
  #
  # The assertion runs only on a tag ref (step-level `if`), because a tag is this repo's ONLY
  # publish path -- there is no workflow_dispatch, and branch/PR runs are build-only (:ci, push
  # false). The JOB itself is NOT job-level gated: it always runs and SUCCEEDS on non-tag (the
  # single step is skipped), so the downstream `needs` is satisfied and build-only PR/merge CI
  # is never blocked. A job-level `if` here would SKIP this job on non-tag and, through `needs`,
  # skip the builds too.
  assert-on-main:
    needs: sync-gpu-allowlist
    if: always() && (needs.sync-gpu-allowlist.result == 'success' || needs.sync-gpu-allowlist.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Assert published commit is on main (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          head="$(git rev-parse HEAD)"
          if ! git merge-base --is-ancestor "$head" origin/main; then
            echo "::error::commit ${head} is not on origin/main; refusing to publish an unreviewed image"
            exit 1
          fi
          echo "commit ${head} is on origin/main; ancestry guard passed."

  studio-image:
    needs: assert-on-main
    name: studio
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || fromJSON('["self-hosted", "gpu"]') }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          path: vivijure-local

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: meta
        run: |
          image="${REGISTRY}/vivijure-local-studio"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Published image tag is clean SemVer (no v). Git tag stays vX.Y.Z;
            # GHCR tag is X.Y.Z so VJ_IMAGE_TAG=1.2.0 matches sibling RunPod pins
            # (vivijure#789 / vivijure-local#125).
            version="${GITHUB_REF_NAME#v}"
            {
              echo "tags<<EOF"
              echo "${image}:latest"
              echo "${image}:${version}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${image}:ci" >> "$GITHUB_OUTPUT"
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build studio image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.0.0
        with:
          context: vivijure-local
          file: vivijure-local/Dockerfile
          push: ${{ steps.meta.outputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  caddy-image:
    needs: assert-on-main
    name: caddy
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || fromJSON('["self-hosted", "gpu"]') }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          path: vivijure-local

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: meta
        run: |
          image="${REGISTRY}/vivijure-local-caddy"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Published image tag is clean SemVer (no v). Git tag stays vX.Y.Z;
            # GHCR tag is X.Y.Z so VJ_IMAGE_TAG=1.2.0 matches sibling RunPod pins
            # (vivijure#789 / vivijure-local#125).
            version="${GITHUB_REF_NAME#v}"
            {
              echo "tags<<EOF"
              echo "${image}:latest"
              echo "${image}:${version}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${image}:ci" >> "$GITHUB_OUTPUT"
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Caddy edge image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.0.0
        with:
          context: vivijure-local/reverse-proxy
          file: vivijure-local/reverse-proxy/Dockerfile
          push: ${{ steps.meta.outputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  finish-rife-serve:
    needs: assert-on-main
    name: finish-rife-serve
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || fromJSON('["self-hosted", "gpu"]') }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
        with:
          path: vivijure-local

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: meta
        run: |
          image="${REGISTRY}/vivijure-local-finish-rife"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
            {
              echo "tags<<EOF"
              echo "${image}:${version}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${image}:ci" >> "$GITHUB_OUTPUT"
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build finish-rife-serve overlay
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.0.0
        with:
          context: ./vivijure-local/containers/finish-rife-serve
          file: ./vivijure-local/containers/finish-rife-serve/Dockerfile
          build-args: BACKEND_IMAGE=ghcr.io/skyphusion-labs/vivijure-backend:1.0.6
          push: ${{ steps.meta.outputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cpu-images:
    needs: assert-on-main
    name: cpu-${{ matrix.image }}
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || fromJSON('["self-hosted", "gpu"]') }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        image:
          - video-finish
          - image-prep
          - audio-beat-sync
          - audio-mix
          - audio-master
    steps:
      - uses: actions/checkout@v7
        with:
          path: vivijure-local

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: meta
        env:
          CPU_IMAGE: ${{ matrix.image }}
        run: |
          image="${REGISTRY}/vivijure-local-${CPU_IMAGE}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Published image tag is clean SemVer (no v). Git tag stays vX.Y.Z;
            # GHCR tag is X.Y.Z so VJ_IMAGE_TAG=1.2.0 matches sibling RunPod pins
            # (vivijure#789 / vivijure-local#125).
            version="${GITHUB_REF_NAME#v}"
            {
              echo "tags<<EOF"
              echo "${image}:latest"
              echo "${image}:${version}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${image}:ci" >> "$GITHUB_OUTPUT"
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build CPU container image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.0.0
        with:
          context: ./vivijure-local/containers/${{ matrix.image }}
          file: ./vivijure-local/containers/${{ matrix.image }}/Dockerfile
          push: ${{ steps.meta.outputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
