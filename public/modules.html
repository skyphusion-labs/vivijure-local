<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Modules -- Vivijure Studio</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="favicon-32.png" type="image/png" sizes="32x32" />
    <link rel="icon" href="favicon-16.png" type="image/png" sizes="16x16" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" sizes="180x180" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#0E1730" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="studio-body" data-studio-page="pipeline">
    <header class="topbar">
      <a class="brand brand-vivijure" href="planner" aria-label="Vivijure studio">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-name">Vivijure</span>
      </a>
      <nav class="studio-nav" data-studio-nav aria-label="Studio pages"></nav>
      <span class="topbar-spacer"></span>
      <div class="status" id="status">connecting...</div>
      <div class="account">
        <button id="account-toggle" type="button" class="icon-btn" aria-haspopup="true" aria-expanded="false" aria-label="Account and tools">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        </button>
        <div id="account-menu" class="account-menu" role="menu" hidden>
          <button id="account-user" class="account-row account-user" type="button" role="menuitem" title="signed in">
            <span class="account-email" id="account-email">loading...</span>
          </button>
          <div class="account-prefs" role="group" aria-label="Preferences">
            <div class="account-prefs-head">Preferences</div>
            <label class="account-pref">
              <input type="checkbox" id="pref-email-notifications" />
              <span class="account-pref-text">
                <span class="account-name">Email me when a render finishes</span>
                <span class="account-sub" id="pref-email-status">No emails when renders finish</span>
              </span>
            </label>
          </div>
        </div>
      </div>
    </header>

    <main class="studio-layout">
      <header class="studio-header">
        <h1>Module host</h1>
        <p class="lede">
          Each stage is served by installed modules. Bind a module worker and its settings appear
          here; bind none and the stage stays empty or falls back to the core default.
        </p>
      </header>

      <div class="studio-grid">
        <section class="panel studio-pipeline-panel" aria-labelledby="pipeline-heading">
          <h2 id="pipeline-heading" class="studio-panel-title">Stages</h2>
          <div id="pipeline" class="pipeline-stages">loading...</div>
        </section>

        <aside class="panel studio-modules-panel" aria-labelledby="modules-heading">
          <h2 id="modules-heading" class="studio-panel-title">Installed modules</h2>
          <div id="modules" class="modules modules-compact"></div>
          <p class="studio-meta" id="studio-meta" hidden></p>
        </aside>
      </div>
    </main>

    <script src="auth-token.js"></script>
    <script src="readonly-gate.js"></script>
    <script src="demo-steer.js"></script>
    <script src="studio-chrome.js"></script>
    <script src="topbar.js"></script>
    <script src="app.js" type="module"></script>
  </body>
</html>
